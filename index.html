<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ÔN TẬP TRẮC NGHIỆM TOÁN (10-11-12)</title>
<script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
<script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
<script>
window.MathJax = {
  tex: {
    inlineMath: [['$', '$'], ['\\(', '\\)']],
    displayMath: [['$$', '$$'], ['\\[', '\\]']],
    packages: {'[+]': ['ams', 'boldsymbol']},
    tags: 'ams',
    multilineWidth: '85%',
    tagsSide: 'right',
    tagIndent: '0.8em'
  },
  svg: {
    fontCache: 'global',
    scale: 1,
    minScale: .5,
    mtextInheritFont: true,
    merrorInheritFont: true,
    mathmlSpacing: false,
    displayAlign: 'center',
    displayIndent: '0'
  },
  options: {
    renderActions: { addMenu: [0, '', ''] },
    ignoreHtmlClass: 'tex2jax_ignore',
    processHtmlClass: 'tex2jax_process'
  },
  startup: { typeset: false }
};
</script>
<style>
/* ========== RESET & CHUNG ========== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}
body {
  background-color: #f5f7fa;
  color: #333;
  line-height: 1.4;
}
.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 10px;
}
header {
  text-align: center;
  margin-bottom: 15px;
  padding: 15px;
  background: linear-gradient(135deg, #1e5799, #207cca);
  color: white;
  border-radius: 10px;
  box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}
h1 {
  font-size: 28px;
  margin-bottom: 5px;
}
.screen {
  display: none;
  background-color: white;
  border-radius: 10px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  padding: 20px;
  margin-bottom: 20px;
}
.active {
  display: block;
}
/* ========== FORM ========== */
.form-group {
  margin-bottom: 15px;
}
label {
  display: block;
  margin-bottom: 5px;
  font-weight: 600;
  color: #2c3e50;
  font-size: 16px;
}
input, select {
  width: 100%;
  padding: 12px;
  border: 1px solid #ddd;
  border-radius: 5px;
  font-size: 16px;
  transition: border-color 0.3s;
}
input:focus, select:focus {
  border-color: #3498db;
  outline: none;
}
.row {
  display: flex;
  gap: 15px;
  margin-bottom: 15px;
}
.col {
  flex: 1;
}
.btn {
  display: inline-block;
  padding: 12px 24px;
  background-color: #3498db;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 16px;
  cursor: pointer;
  transition: background-color 0.3s;
  text-align: center;
  margin-right: 10px;
  margin-top: 10px;
  width: 100%;
}
.btn:hover {
  background-color: #2980b9;
}
.btn-secondary {
  background-color: #7f8c8d;
}
.btn-success {
  background-color: #2ecc71;
}
.btn-danger {
  background-color: #e74c3c;
}
/* ========== TEST SCREEN ========== */
.test-header-container {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 15px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}
.test-title {
  font-size: 20px;
  font-weight: bold;
  color: #2c3e50;
}
.test-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.timer {
  text-align: center;
  font-size: 28px;
  font-weight: bold;
  color: #e74c3c;
  background: #f9f9f9;
  padding: 5px 10px;
  border-radius: 5px;
}
.question-counter {
  font-size: 18px;
  font-weight: bold;
}
.question {
  margin-bottom: 20px;
  padding: 15px;
  background-color: #f9f9f9;
  border-radius: 8px;
  border-left: 4px solid #3498db;
}
.question-number {
  font-weight: bold;
  color: #3498db;
  margin-bottom: 8px;
  font-size: 20px;
}
.question-content {
  margin-bottom: 12px;
  font-size: 18px;
}
.options {
  list-style-type: none;
}
.option {
  padding: 10px 15px;
  margin-bottom: 8px;
  background-color: white;
  border-radius: 5px;
  cursor: pointer;
  border: 1px solid #e0e0e0;
  font-size: 18px;
  transition: all 0.2s;
}
.option:hover {
  background-color: #f0f7ff;
  border-color: #3498db;
}
.option.selected {
  background-color: #e1f0ff;
  border-color: #3498db;
  font-weight: bold;
}
/* Phần 2: mệnh đề */
.statements-group {
  margin-top: 15px;
  background: #fff;
  border-radius: 8px;
  padding: 10px;
  border: 1px solid #e0e0e0;
}
.statement-item {
  margin-bottom: 15px;
  padding: 8px;
  background: #fefefe;
  border-left: 3px solid #9b59b6;
}
.statement-text {
  font-size: 17px;
  margin-bottom: 8px;
  font-weight: 500;
}
.statement-options {
  display: flex;
  gap: 20px;
  align-items: center;
}
.statement-options label {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  font-weight: normal;
  cursor: pointer;
  margin-right: 15px;
}
.statement-options input {
  width: auto;
  margin-right: 5px;
  transform: scale(1.1);
}
.part-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  color: white;
  font-size: 12px;
  margin-right: 5px;
  font-weight: bold;
}
.badge-p1 { background-color: #3498db; }
.badge-p2 { background-color: #9b59b6; }
.badge-p3 { background-color: #e67e22; }
.notification {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: rgba(46,204,113,0.9);
  color: white;
  padding: 15px 30px;
  border-radius: 8px;
  font-size: 18px;
  font-weight: bold;
  z-index: 1000;
  display: none;
}
/* ========== KẾT QUẢ ========== */
.result-header {
  text-align: center;
  margin-bottom: 10px;
  padding-bottom: 10px;
  border-bottom: 1px solid #eee;
}
.result-header h2 {
  font-size: 22px;
}
.result-wrapper {
  display: flex;
  flex-direction: row;
  gap: 20px;
  align-items: stretch;
}
.result-left {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 15px;
  background-color: #fff;
  border-radius: 8px;
  text-align: center;
}
.student-name-display {
  color: #1890ff;
  font-weight: bold;
  font-size: 50px;
  margin-bottom: 15px;
  line-height: 1.1;
}
.chart-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin-bottom: 15px;
  flex-shrink: 0;
}
.pie-chart {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  background: conic-gradient(#eee 0% 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 1s ease-out;
}
.pie-chart::after {
  content: "";
  position: absolute;
  width: 75%;
  height: 75%;
  background-color: white;
  border-radius: 50%;
}
.chart-center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  z-index: 10;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.percentage-text {
  display: block;
  font-size: 40px;
  font-weight: 800;
  color: #333;
  line-height: 1;
}
.score-detail-text {
  display: none;
}
.exam-date {
  color: #000;
  font-weight: bold;
  font-size: 18.5px;
  margin-top: auto;
  padding-top: 10px;
  border-top: 1px solid #eee;
  width: 100%;
}
.result-right {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 10px;
}
.grid-item {
  background-color: #f8f9fa;
  border-radius: 8px;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  border: 1px solid #eee;
}
.grid-icon {
  width: 52px;
  height: 52px;
  margin-bottom: 10px;
  color: #555;
}
.grid-label {
  font-size: 18px;
  color: #666;
  margin-bottom: 5px;
}
.grid-value {
  font-size: 27px;
  color: #333;
  font-weight: bold;
}
.review-list {
  margin-top: 20px;
  width: 100%;
}
.review-item {
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border-left: 4px solid;
  background-color: #fff;
  border: 1px solid #eee;
}
.review-item.correct {
  border-left-color: #2ecc71;
  background-color: #f0fff4;
}
.review-item.incorrect {
  border-left-color: #e74c3c;
  background-color: #fff5f5;
}
.review-item.unanswered {
  border-left-color: #95a5a6;
  background-color: #f8f9fa;
}
.review-question-title {
  font-weight: bold;
  margin-bottom: 5px;
  font-size: 16px;
}
.review-options {
  margin-top: 5px;
}
.review-option-row {
  padding: 3px 0;
  font-size: 14px;
}
.review-statement {
  margin-bottom: 8px;
  padding-left: 8px;
  border-left: 2px solid #ccc;
}
.review-statement.correct-st {
  color: #2ecc71;
}
.review-statement.incorrect-st {
  color: #e74c3c;
}
.math-container {
  margin: 5px 0;
  padding: 5px;
  background-color: rgba(255,255,255,0.9);
  border-radius: 3px;
  overflow-x: auto;
}
/* Phần 3: input và bàn phím ảo */
.input-group {
  margin-top: 15px;
  display: flex;
  flex-direction: column;
  gap: 15px;
}
.number-input {
  width: 100%;
  padding: 12px;
  font-size: 20px;
  text-align: center;
  border: 2px solid #3498db;
  border-radius: 8px;
  background: white;
}
.virtual-keypad {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  background: #f0f0f0;
  padding: 10px;
  border-radius: 10px;
  margin-top: 5px;
}
.keypad-btn {
  padding: 12px;
  font-size: 20px;
  font-weight: bold;
  background: white;
  border: 1px solid #ccc;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}
.keypad-btn:hover {
  background: #e0e0e0;
  transform: scale(0.98);
}
.keypad-btn.special {
  background: #ff9800;
  color: white;
}
.keypad-btn.ok {
  background: #4caf50;
  color: white;
  grid-column: span 2;
}
/* Responsive */
@media (max-width: 768px) {
  .row { flex-direction: column; gap: 10px; }
  .btn { padding: 10px; font-size: 14px; }
  .result-wrapper { flex-direction: column; gap: 10px; }
  .result-left { padding: 10px 5px; }
  .student-name-display { font-size: 29px; margin-bottom: 5px; }
  .chart-container { width: 140px; height: 140px; margin-bottom: 5px; }
  .percentage-text { font-size: 26px; }
  .score-detail-text { font-size: 14px; }
  .exam-date { font-size: 14px; padding-top: 5px; }
  .result-right { width: 100%; gap: 6px; }
  .grid-item { padding: 6px; }
  .grid-icon { width: 20px; height: 20px; margin-bottom: 2px; }
  .grid-label { font-size: 10px; }
  .grid-value { font-size: 14px; }
  .review-item { padding: 8px; }
  .review-question-title { font-size: 14px; }
  .statement-text { font-size: 14px; }
  .screen { padding: 10px; margin-bottom: 10px; }
  .virtual-keypad { gap: 5px; }
  .keypad-btn { padding: 8px; font-size: 16px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>ÔN TẬP TRẮC NGHIỆM TOÁN (10-11-12)</h1>
  </header>

  <!-- Màn hình chính -->
  <div id="main-screen" class="screen active">
    <div class="form-group">
      <label for="student-name">Họ và tên:</label>
      <input type="text" id="student-name" maxlength="40" placeholder="Nhập họ và tên (tối đa 40 ký tự)">
    </div>
    <div class="row">
      <div class="col">
        <div class="form-group">
          <label for="grade-select">Chọn lớp:</label>
          <select id="grade-select">
            <option value="">-- Chọn lớp --</option>
            <option value="10">TOÁN LỚP 10</option>
            <option value="11">TOÁN LỚP 11</option>
            <option value="12">TOÁN LỚP 12</option>
          </select>
        </div>
      </div>
      <div class="col">
        <div class="form-group">
          <label for="term-select">Chọn kỳ ôn tập:</label>
          <select id="term-select">
            <option value="">-- Chọn kỳ --</option>
            <option value="GK1">GIỮA HỌC KÌ 1</option>
            <option value="HK1">CUỐI HỌC KÌ 1</option>
            <option value="GK2">GIỮA HỌC KÌ 2</option>
            <option value="HK2">CUỐI HỌC KÌ 2</option>
            <option value="THI">THI THỬ TỐT NGHIỆP</option>
          </select>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Mã kho đề: <span id="code-display" style="font-weight: bold; color: #e74c3c;"></span></label>
    </div>
    <button id="start-btn" class="btn btn-success">Bắt đầu làm bài</button>
    <div class="contact-info" style="background:#f8f9fa; padding:15px; border-radius:8px; text-align:center; font-size:14px; margin-top:15px;">
      <h3 style="color:#2c3e50;">Thông tin liên hệ</h3>
      <p><strong>Thầy Lê Duy Hùng</strong></p>
      <p>ZALO: 0967 095 025</p>
      <p>FACEBOOK: <a href="https://www.facebook.com/leduyhung.vietnam" target="_blank" style="color:#3498db;">https://www.facebook.com/leduyhung.vietnam</a></p>
    </div>
  </div>

  <!-- Màn hình làm bài -->
  <div id="test-screen" class="screen">
    <div class="test-header-container">
      <div class="test-title" id="test-title"></div>
      <div class="test-info">
        <div class="timer" id="timer">60:00</div>
        <div class="question-counter">
          Câu <span id="current-question-number">1</span>/<span id="total-questions">24</span>
        </div>
      </div>
    </div>
    <div id="current-question-container"></div>
    <div style="text-align: center;">
      <button id="submit-test-btn" class="btn btn-danger">NỘP BÀI</button>
    </div>
  </div>

  <!-- Màn hình kết quả -->
  <div id="result-screen" class="screen">
    <div class="result-header">
      <h2 id="result-title"></h2>
    </div>
    <div class="result-wrapper">
      <div class="result-left">
        <div class="student-name-display" id="result-student-name"></div>
        <div class="chart-container">
          <div class="pie-chart" id="score-chart"></div>
          <div class="chart-center">
            <span class="percentage-text" id="score-percentage">0%</span>
            <span class="score-detail-text" id="score-detail"></span>
          </div>
        </div>
        <div class="exam-date" id="result-date"></div>
      </div>
      <div class="result-right">
        <div class="grid-item time-start">
          <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <div class="grid-label">Bắt đầu</div>
          <div class="grid-value" id="start-time-hms">00:00:00</div>
        </div>
        <div class="grid-item time-end">
          <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
          <div class="grid-label">Kết thúc</div>
          <div class="grid-value" id="end-time-hms">00:00:00</div>
        </div>
        <div class="grid-item wrong">
          <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>
          <div class="grid-label">Sai</div>
          <div class="grid-value" id="incorrect-count">0/24</div>
        </div>
        <div class="grid-item unanswered">
          <svg class="grid-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="8"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
          <div class="grid-label">Chưa chọn</div>
          <div class="grid-value" id="unanswered-count">0/24</div>
        </div>
      </div>
    </div>
    <div id="cheating-warning" style="display: none; background-color: #ffebee; color: #c62828; padding: 10px; border-radius: 8px; margin-bottom: 15px; text-align: center; font-weight: bold;"></div>
    <div class="review-list" id="review-list"></div>
    <div style="text-align: center; margin-top: 20px;">
      <button id="retry-btn" class="btn btn-success">LÀM LẠI</button>
      <button id="back-btn" class="btn btn-secondary">QUAY LẠI</button>
    </div>
  </div>
</div>
<div id="notification" class="notification"></div>

<script>
// ======================= KHO ĐỀ MẪU ĐẦY ĐỦ (LỚP 10, 11, 12) =======================
const questionBanks = {
  // ---------- LỚP 10 ----------
  'T10GK1': {
    P1: [
      { id: 1, content: "Tập xác định của hàm số $y = \\sqrt{x-2}$ là:", correct: "$[2;+\\infty)$", wrong1: "$(-\\infty;2]$", wrong2: "$\\mathbb{R}$", wrong3: "$(2;+\\infty)$" },
      { id: 2, content: "Cho $\\vec{a} = (1;2)$, $\\vec{b} = (3;4)$. Tích vô hướng $\\vec{a} \\cdot \\vec{b}$ bằng:", correct: "$11$", wrong1: "$10$", wrong2: "$12$", wrong3: "$14$" },
      { id: 3, content: "Phương trình $x^2 - 3x + 2 = 0$ có nghiệm là:", correct: "$1$ và $2$", wrong1: "$-1$ và $-2$", wrong2: "$1$ và $-2$", wrong3: "$-1$ và $2$" }
    ],
    P2: [
      { id: 1, content: "Cho hàm số $y = x^2 - 2x + 3$. Xét tính đúng sai:", statements: [
        { text: "Đồ thị là parabol có đỉnh $I(1;2)$.", correct: true },
        { text: "Hàm số đồng biến trên khoảng $(1;+\\infty)$.", correct: true }
      ]}
    ],
    P3: [
      { id: 1, content: "Tập xác định của hàm số $y = \\dfrac{1}{x-2}$ là $\\mathbb{R} \\setminus \\{...\\}$", answerType: "int_pos", correct: 2 }
    ]
  },
  // ---------- LỚP 11 ----------
  'T11GK1': {
    P1: [
      { id:1, content:"$\\lim_{x\\to 2} (x^2+1)$ bằng:", correct:"$5$", wrong1:"$4$", wrong2:"$3$", wrong3:"$6$" },
      { id:2, content:"Đạo hàm của $y = x^3$ là:", correct:"$3x^2$", wrong1:"$x^2$", wrong2:"$3x$", wrong3:"$x^3$" }
    ],
    P2: [],
    P3: []
  },
  // ---------- LỚP 12 (HK2) ----------

  'T12HK2': {
P1: [
  {
    "id": 1,
    "content": "Trong không gian với hệ tọa độ $Oxyz$, gọi $\\alpha$ là góc giữa hai mặt phẳng $(P): x + 2y - z + 2 = 0$ và $(Q): 2x - y - z + 4 = 0$. Tính $\\cos \\alpha$.",
    "correct": "$\\frac{1}{6}$",
    "wrong1": "$\\frac{3}{4}$",
    "wrong2": "$\\frac{1}{3}$",
    "wrong3": "$-\\frac{1}{3}$"
  },
  {
    "id": 2,
    "content": "Trong không gian $Oxyz$, phương trình mặt phẳng $(P)$ đi qua điểm $M(2; 1; -2)$ và vuông góc với hai mặt phẳng $(Q): x + y + 2z - 3 = 0$ và $(R): x - y - z + 4 = 0$ là",
    "correct": "$x + 3y - 2z - 9 = 0$",
    "wrong1": "$x + 3y - 2z + 9 = 0$",
    "wrong2": "$2x + y - 2z - 9 = 0$",
    "wrong3": "$2x + y - 2z + 9 = 0$"
  },
  {
    "id": 3,
    "content": "Trong không gian với hệ tọa độ $Oxyz$, một vectơ pháp tuyến của mặt phẳng $\\frac{x}{-2} + \\frac{y}{-1} + \\frac{z}{3} = 1$ là",

// ======================= BIẾN TOÀN CỤC =======================
let currentScreen = 'main-screen';
let userAnswers = {};
let testStartTime = null;
let testSubmitTime = null;
let timerInterval = null;
let timeLeft = 3600; // 60 phút = 3600 giây
let currentTestCode = '';
let currentQuestions = [];
let studentName = '';
let currentQuestionIndex = 0;
let isTransitioning = false;
let isCheating = false;

function showScreen(screenId) {
  document.getElementById(currentScreen).classList.remove('active');
  document.getElementById(screenId).classList.add('active');
  currentScreen = screenId;
  if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 100);
}

function updateTestCode() {
  const grade = document.getElementById('grade-select').value;
  const term = document.getElementById('term-select').value;
  if (grade && term) {
    currentTestCode = `T${grade}${term}`;
    document.getElementById('code-display').textContent = currentTestCode;
  } else {
    currentTestCode = '';
    document.getElementById('code-display').textContent = '';
  }
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function convertToDisplayFormat(question, partType) {
  if (partType === 'P2') {
    const allStatements = [...question.statements];
    const shuffledSt = shuffleArray(allStatements);
    const selectedSt = shuffledSt.slice(0, 4);
    return {
      id: `${partType}-${question.id}`,
      originalId: question.id,
      partType: 'P2',
      content: question.content,
      statements: selectedSt.map((st, idx) => ({ index: idx, text: st.text, correct: st.correct })),
      correctAnswer: selectedSt.map(st => st.correct)
    };
  } else if (partType === 'P3') {
    return {
      id: `${partType}-${question.id}`,
      originalId: question.id,
      partType: 'P3',
      content: question.content,
      answerType: question.answerType,
      correctValue: question.correct,
      decimals: question.decimals !== undefined ? question.decimals : 2
    };
  } else {
    const labels = ['A', 'B', 'C', 'D'];
    const allChoices = [
      { text: question.correct, isCorrect: true },
      { text: question.wrong1, isCorrect: false },
      { text: question.wrong2, isCorrect: false },
      { text: question.wrong3, isCorrect: false }
    ].filter(c => c.text && c.text.trim() !== "");
    const shuffledChoices = shuffleArray([...allChoices]);
    const correctChoice = shuffledChoices.find(c => c.isCorrect);
    const correctIndex = shuffledChoices.indexOf(correctChoice);
    const correctAnswer = labels[correctIndex];
    const options = shuffledChoices.map((c, idx) => ({ id: labels[idx], text: c.text }));
    return {
      id: `${partType}-${question.id}`,
      originalId: question.id,
      partType: partType,
      content: question.content,
      options: options,
      correctAnswer: correctAnswer
    };
  }
}

function getRandomQuestions(code) {
  const bank = questionBanks[code];
  if (!bank) return [];
  const finalQuestions = [];
  if (bank.P1 && bank.P1.length) {
    const shuffledP1 = shuffleArray([...bank.P1]);
    const selectedP1 = shuffledP1.slice(0, 16);
    finalQuestions.push(...selectedP1.map(q => convertToDisplayFormat(q, 'P1')));
  }
  if (bank.P2 && bank.P2.length) {
    const shuffledP2 = shuffleArray([...bank.P2]);
    const selectedP2 = shuffledP2.slice(0, 4);
    finalQuestions.push(...selectedP2.map(q => convertToDisplayFormat(q, 'P2')));
  }
  if (bank.P3 && bank.P3.length) {
    const shuffledP3 = shuffleArray([...bank.P3]);
    const selectedP3 = shuffledP3.slice(0, 4);
    finalQuestions.push(...selectedP3.map(q => convertToDisplayFormat(q, 'P3')));
  }
  finalQuestions.forEach((q, idx) => q.displayOrder = idx + 1);
  return finalQuestions;
}

function startTest() {
  studentName = document.getElementById('student-name').value.trim();
  const grade = document.getElementById('grade-select').value;
  const term = document.getElementById('term-select').value;
  if (!studentName) { alert('Vui lòng nhập họ và tên!'); return; }
  if (!grade || !term) { alert('Vui lòng chọn lớp và kỳ ôn tập!'); return; }
  if (studentName.length > 40) { alert('Họ và tên không quá 40 ký tự!'); return; }

  currentQuestions = getRandomQuestions(currentTestCode);
  if (currentQuestions.length === 0) {
    alert('Kho đề này hiện đang trống. Vui lòng chọn đề khác.');
    return;
  }

  userAnswers = {};
  timeLeft = 3600;
  testStartTime = new Date();
  currentQuestionIndex = 0;
  isTransitioning = false;
  isCheating = false;

  const gradeNames = { '10':'TOÁN LỚP 10', '11':'TOÁN LỚP 11', '12':'TOÁN LỚP 12' };
  const termNames = { 'GK1':'GIỮA HỌC KÌ 1','HK1':'CUỐI HỌC KÌ 1','GK2':'GIỮA HỌC KÌ 2','HK2':'CUỐI HỌC KÌ 2','THI':'THI TỐT NGHIỆP' };
  document.getElementById('test-title').textContent = `${gradeNames[grade]} - ${termNames[term]}`;
  document.getElementById('total-questions').textContent = currentQuestions.length;
  renderCurrentQuestion();
  startTimer();
  showScreen('test-screen');
  document.addEventListener('visibilitychange', handleVisibilityChange);
}

function handleVisibilityChange() {
  if (document.hidden && !isCheating && testStartTime) {
    isCheating = true;
    clearInterval(timerInterval);
    submitTest();
  }
}

function startTimer() {
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeLeft--;
    updateTimerDisplay();
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      submitTest();
    }
  }, 1000);
}

function updateTimerDisplay() {
  const minutes = Math.floor(timeLeft / 60);
  const seconds = timeLeft % 60;
  document.getElementById('timer').textContent = `${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}`;
  if (timeLeft <= 60) document.getElementById('timer').style.backgroundColor = '#ffebee';
  else document.getElementById('timer').style.backgroundColor = '#f9f9f9';
}

function showNotification(msg, duration = 1000) {
  const n = document.getElementById('notification');
  n.textContent = msg;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', duration);
}

function getPartBadgeClass(partType) {
  if (partType === 'P1') return 'badge-p1';
  if (partType === 'P2') return 'badge-p2';
  return 'badge-p3';
}

function allStatementsSelected(questionId, total) {
  const ans = userAnswers[questionId];
  if (!ans) return false;
  for (let i = 0; i < total; i++) {
    if (ans[i] === undefined) return false;
  }
  return true;
}

function tryAutoAdvance() {
  if (isTransitioning) return;
  const q = currentQuestions[currentQuestionIndex];
  if (q.partType === 'P2') {
    if (allStatementsSelected(q.id, q.statements.length)) {
      isTransitioning = true;
      showNotification("Đã chọn đủ mệnh đề!");
      setTimeout(() => {
        if (currentQuestionIndex >= currentQuestions.length - 1) {
          submitTest();
        } else {
          currentQuestionIndex++;
          renderCurrentQuestion();
          isTransitioning = false;
        }
      }, 800);
    }
  }
}

function createVirtualKeypad(inputElement, onOkCallback) {
  const keypadDiv = document.createElement('div');
  keypadDiv.className = 'virtual-keypad';
  const buttons = [
    '7', '8', '9', 'DEL',
    '4', '5', '6', '-',
    '1', '2', '3', '.',
    '0', 'OK', 'C'
  ];
  buttons.forEach(btn => {
    const btnElem = document.createElement('div');
    btnElem.className = 'keypad-btn';
    if (btn === 'OK') btnElem.classList.add('ok');
    if (btn === 'DEL' || btn === 'C') btnElem.classList.add('special');
    btnElem.textContent = btn;
    btnElem.addEventListener('click', () => {
      if (btn === 'DEL') {
        inputElement.value = inputElement.value.slice(0, -1);
      } else if (btn === 'C') {
        inputElement.value = '';
      } else if (btn === 'OK') {
        onOkCallback();
      } else {
        inputElement.value += btn;
      }
    });
    keypadDiv.appendChild(btnElem);
  });
  return keypadDiv;
}

function renderCurrentQuestion() {
  const container = document.getElementById('current-question-container');
  const q = currentQuestions[currentQuestionIndex];

  if (q.partType === 'P2') {
    let statementsHtml = '';
    q.statements.forEach((st, idx) => {
      const saved = (userAnswers[q.id] && userAnswers[q.id][idx] !== undefined) ? userAnswers[q.id][idx] : null;
      const trueChecked = (saved === true) ? 'checked' : '';
      const falseChecked = (saved === false) ? 'checked' : '';
      statementsHtml += `
        <div class="statement-item" data-st-idx="${idx}">
          <div class="statement-text"><div class="math-container">${st.text}</div></div>
          <div class="statement-options">
            <label><input type="radio" name="stmt_${q.id}_${idx}" value="true" ${trueChecked}> Đúng</label>
            <label><input type="radio" name="stmt_${q.id}_${idx}" value="false" ${falseChecked}> Sai</label>
          </div>
        </div>
      `;
    });
    container.innerHTML = `
      <div class="question">
        <div class="question-number">
          <span class="part-badge ${getPartBadgeClass(q.partType)}">Phần 2 (Đ/S)</span>
          Câu ${q.displayOrder} - ${currentTestCode}
        </div>
        <div class="question-content"><div class="math-container">${q.content}</div></div>
        <div class="statements-group">${statementsHtml}</div>
      </div>
    `;
    q.statements.forEach((_, idx) => {
      const radios = document.querySelectorAll(`input[name="stmt_${q.id}_${idx}"]`);
      radios.forEach(radio => {
        radio.addEventListener('change', (e) => {
          if (isTransitioning) return;
          const val = e.target.value === 'true';
          if (!userAnswers[q.id]) userAnswers[q.id] = {};
          userAnswers[q.id][idx] = val;
          showNotification("Đã chọn mệnh đề", 500);
          tryAutoAdvance();
        });
      });
    });
  } else if (q.partType === 'P3') {
    const savedValue = userAnswers[q.id] !== undefined ? userAnswers[q.id] : '';
    container.innerHTML = `
      <div class="question">
        <div class="question-number">
          <span class="part-badge ${getPartBadgeClass(q.partType)}">Phần 3 (Điền số)</span>
          Câu ${q.displayOrder} - ${currentTestCode}
        </div>
        <div class="question-content"><div class="math-container">${q.content}</div></div>
        <div class="input-group">
          <input type="text" id="p3-input-${q.id}" class="number-input" placeholder="Nhập số" value="${savedValue}">
          <div id="keypad-${q.id}"></div>
          <button id="p3-ok-${q.id}" class="btn btn-success">OK</button>
        </div>
      </div>
    `;
    const inputField = document.getElementById(`p3-input-${q.id}`);
    const keypadContainer = document.getElementById(`keypad-${q.id}`);
    const okBtn = document.getElementById(`p3-ok-${q.id}`);

    const handleOk = () => {
      if (isTransitioning) return;
      const rawValue = inputField.value.trim();
      if (rawValue === '') {
        showNotification("Vui lòng nhập số!", 800);
        return;
      }
      let numericValue = null;
      if (q.answerType === 'int_pos' || q.answerType === 'int_neg') {
        const num = Number(rawValue);
        if (!isNaN(num) && Number.isInteger(num)) {
          numericValue = num;
        } else {
          showNotification("Vui lòng nhập số nguyên!", 800);
          return;
        }
      } else if (q.answerType === 'float_pos' || q.answerType === 'float_neg') {
        const num = parseFloat(rawValue);
        if (!isNaN(num)) {
          numericValue = num;
        } else {
          showNotification("Vui lòng nhập số thực!", 800);
          return;
        }
      } else if (q.answerType === 'str') {
        numericValue = rawValue;
      }
      userAnswers[q.id] = numericValue;
      showNotification("Đã lưu đáp án!");
      isTransitioning = true;
      setTimeout(() => {
        if (currentQuestionIndex >= currentQuestions.length - 1) {
          submitTest();
        } else {
          currentQuestionIndex++;
          renderCurrentQuestion();
          isTransitioning = false;
        }
      }, 600);
    };

    const keypad = createVirtualKeypad(inputField, handleOk);
    keypadContainer.appendChild(keypad);
    okBtn.addEventListener('click', handleOk);
  } else {
    let optionsHtml = '';
    q.options.forEach(opt => {
      optionsHtml += `<li class="option" data-option="${opt.id}"><div class="math-container"><strong>${opt.id}.</strong> ${opt.text}</div></li>`;
    });
    container.innerHTML = `
      <div class="question">
        <div class="question-number">
          <span class="part-badge ${getPartBadgeClass(q.partType)}">Phần 1</span>
          Câu ${q.displayOrder} - ${currentTestCode}
        </div>
        <div class="question-content"><div class="math-container">${q.content}</div></div>
        <ul class="options">${optionsHtml}</ul>
      </div>
    `;
    document.querySelectorAll('.option').forEach(opt => {
      opt.addEventListener('click', function() {
        if (isTransitioning) return;
        const selected = this.getAttribute('data-option');
        userAnswers[q.id] = selected;
        showNotification("Đã chọn đáp án", 500);
        isTransitioning = true;
        setTimeout(() => {
          if (currentQuestionIndex >= currentQuestions.length - 1) {
            submitTest();
          } else {
            currentQuestionIndex++;
            renderCurrentQuestion();
            isTransitioning = false;
          }
        }, 800);
      });
    });
  }

  document.getElementById('current-question-number').textContent = currentQuestionIndex + 1;
  if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 200);
}

function isQuestionAnswered(q) {
  const ans = userAnswers[q.id];
  if (!ans) return false;
  if (q.partType === 'P2') {
    return Object.keys(ans).length > 0;
  }
  return true;
}

function calculateScore() {
  let totalScore = 0;
  let correctCountLegacy = 0;
  let incorrectCount = 0;
  let unansweredCount = 0;

  currentQuestions.forEach(q => {
    if (q.partType === 'P1') {
      const ans = userAnswers[q.id];
      if (ans && ans === q.correctAnswer) {
        totalScore += 2.5;
        correctCountLegacy++;
      } else if (ans) {
        incorrectCount++;
      } else {
        unansweredCount++;
      }
    } else if (q.partType === 'P2') {
      const userSt = userAnswers[q.id] || {};
      let correctStatements = 0;
      let allAnswered = true;
      for (let i = 0; i < q.statements.length; i++) {
        if (userSt[i] !== undefined) {
          if (userSt[i] === q.statements[i].correct) correctStatements++;
        } else {
          allAnswered = false;
        }
      }
      if (allAnswered) {
        if (correctStatements === 4) totalScore += 10;
        else if (correctStatements === 3) totalScore += 5;
        else if (correctStatements === 2) totalScore += 2.5;
        else if (correctStatements === 1) totalScore += 1;
      }
      if (allAnswered && correctStatements === 4) {
        correctCountLegacy++;
      } else if (allAnswered) {
        incorrectCount++;
      } else {
        unansweredCount++;
      }
    } else if (q.partType === 'P3') {
      const userAns = userAnswers[q.id];
      let isCorrect = false;
      if (userAns !== undefined) {
        if (q.answerType === 'str') {
          isCorrect = (userAns === q.correctValue);
        } else {
          const userNum = parseFloat(userAns);
          const correctNum = parseFloat(q.correctValue);
          if (!isNaN(userNum) && !isNaN(correctNum)) {
            if (q.answerType === 'float_pos' || q.answerType === 'float_neg') {
              const decimals = q.decimals !== undefined ? q.decimals : 2;
              const factor = Math.pow(10, decimals);
              const roundedUser = Math.round(userNum * factor) / factor;
              const roundedCorrect = Math.round(correctNum * factor) / factor;
              isCorrect = (roundedUser === roundedCorrect);
            } else {
              isCorrect = (userNum === correctNum);
            }
          }
        }
        if (isCorrect) {
          totalScore += 5;
          correctCountLegacy++;
        } else {
          incorrectCount++;
        }
      } else {
        unansweredCount++;
      }
    }
  });

  return { totalScore, correctCountLegacy, incorrectCount, unansweredCount };
}

function submitTest() {
  clearInterval(timerInterval);
  testSubmitTime = new Date();
  document.removeEventListener('visibilitychange', handleVisibilityChange);
  showResults(isCheating);
}

function getScoreColor(percent) {
  if (percent < 50) return '#f5222d';
  if (percent < 70) return '#faad14';
  if (percent < 80) return '#52c41a';
  if (percent < 90) return '#13c2c2';
  if (percent < 100) return '#1890ff';
  return '#722ed1';
}

function showResults(cheating = false) {
  const grade = document.getElementById('grade-select').value;
  const term = document.getElementById('term-select').value;
  const gradeNames = { '10':'TOÁN LỚP 10', '11':'TOÁN LỚP 11', '12':'TOÁN LỚP 12' };
  const termNames = { 'GK1':'GIỮA HỌC KÌ 1','HK1':'CUỐI HỌC KÌ 1','GK2':'GIỮA HỌC KÌ 2','HK2':'CUỐI HỌC KÌ 2','THI':'THI THỬ TỐT NGHIỆP' };
  document.getElementById('result-title').textContent = `${gradeNames[grade]} - ${termNames[term]} - KẾT QUẢ`;
  const { totalScore, correctCountLegacy, incorrectCount, unansweredCount } = calculateScore();
  document.getElementById('result-student-name').textContent = studentName;
  const color = getScoreColor(totalScore);
  document.getElementById('score-chart').style.background = `conic-gradient(${color} ${totalScore}%, #eee ${totalScore}% 100%)`;
  document.getElementById('score-percentage').textContent = `${totalScore.toFixed(1)}%`;
  document.getElementById('score-detail').textContent = '';
  document.getElementById('result-date').textContent = `${testSubmitTime.getDate().toString().padStart(2,'0')}/${(testSubmitTime.getMonth()+1).toString().padStart(2,'0')}/${testSubmitTime.getFullYear()}`;
  document.getElementById('start-time-hms').textContent = formatTimeHMS(testStartTime);
  document.getElementById('end-time-hms').textContent = formatTimeHMS(testSubmitTime);
  document.getElementById('incorrect-count').textContent = `${incorrectCount}/${currentQuestions.length}`;
  document.getElementById('unanswered-count').textContent = `${unansweredCount}/${currentQuestions.length}`;

  const warningDiv = document.getElementById('cheating-warning');
  if (cheating) {
    warningDiv.style.display = 'block';
    warningDiv.innerHTML = '⚠️ PHÁT HIỆN GIAN LẬN (chuyển tab/ứng dụng). Chỉ hiển thị các câu đã làm.';
  } else {
    warningDiv.style.display = 'none';
  }

  renderReviewQuestions(cheating);
  showScreen('result-screen');
}

function formatTimeHMS(date) {
  return `${date.getHours().toString().padStart(2,'0')}:${date.getMinutes().toString().padStart(2,'0')}:${date.getSeconds().toString().padStart(2,'0')}`;
}

function renderReviewQuestions(cheating = false) {
  const container = document.getElementById('review-list');
  container.innerHTML = '';
  currentQuestions.forEach(q => {
    if (cheating && !isQuestionAnswered(q)) return;

    if (q.partType === 'P2') {
      const userSt = userAnswers[q.id] || {};
      let allCorrect = true;
      for (let i = 0; i < q.statements.length; i++) {
        if (userSt[i] !== q.statements[i].correct) { allCorrect = false; break; }
      }
      const statusClass = allCorrect ? 'correct' : (Object.keys(userSt).length === q.statements.length ? 'incorrect' : 'unanswered');
      let stHtml = '';
      q.statements.forEach((st, idx) => {
        const userChoice = userSt[idx];
        const isCorrect = (userChoice === st.correct);
        const stClass = (userChoice !== undefined) ? (isCorrect ? 'correct-st' : 'incorrect-st') : '';
        const userText = (userChoice === undefined) ? 'Chưa chọn' : (userChoice ? 'Đúng' : 'Sai');
        stHtml += `<div class="review-statement ${stClass}"><strong>Mệnh đề ${idx+1}:</strong> ${st.text}<br><span style="font-size:13px;">→ Bạn chọn: ${userText} (Đáp án: ${st.correct ? 'Đúng' : 'Sai'})</span></div>`;
      });
      container.innerHTML += `<div class="review-item ${statusClass}"><div class="review-question-title"><span class="part-badge ${getPartBadgeClass(q.partType)}">P2</span> Câu ${q.displayOrder} - ${currentTestCode}</div><div class="question-content" style="margin-bottom:5px;">${q.content}</div>${stHtml}</div>`;
    } else if (q.partType === 'P3') {
      const userAns = userAnswers[q.id];
      let isCorrect = false;
      if (userAns !== undefined) {
        if (q.answerType === 'str') {
          isCorrect = (userAns === q.correctValue);
        } else {
          const userNum = parseFloat(userAns);
          const correctNum = parseFloat(q.correctValue);
          if (!isNaN(userNum) && !isNaN(correctNum)) {
            if (q.answerType === 'float_pos' || q.answerType === 'float_neg') {
              const decimals = q.decimals !== undefined ? q.decimals : 2;
              const factor = Math.pow(10, decimals);
              const roundedUser = Math.round(userNum * factor) / factor;
              const roundedCorrect = Math.round(correctNum * factor) / factor;
              isCorrect = (roundedUser === roundedCorrect);
            } else {
              isCorrect = (userNum === correctNum);
            }
          }
        }
      }
      const statusClass = (userAns !== undefined) ? (isCorrect ? 'correct' : 'incorrect') : 'unanswered';
      const answerDisplay = (userAns !== undefined) ? userAns : 'Chưa điền';
      container.innerHTML += `<div class="review-item ${statusClass}"><div class="review-question-title"><span class="part-badge ${getPartBadgeClass(q.partType)}">P3</span> Câu ${q.displayOrder} - ${currentTestCode}</div><div class="question-content">${q.content}</div><div><strong>Đáp án của bạn:</strong> ${answerDisplay}</div><div><strong>Đáp án đúng:</strong> ${q.correctValue}</div></div>`;
    } else {
      const userAns = userAnswers[q.id];
      const isCorrect = (userAns === q.correctAnswer);
      const statusClass = userAns ? (isCorrect ? 'correct' : 'incorrect') : 'unanswered';
      let optionsHtml = '';
      q.options.forEach(opt => {
        let style = '';
        if (opt.id === q.correctAnswer) style = 'color:#2ecc71; font-weight:bold;';
        else if (opt.id === userAns && !isCorrect) style = 'color:#e74c3c; text-decoration:line-through;';
        optionsHtml += `<div class="review-option-row" style="${style}">${opt.id}. ${opt.text}</div>`;
      });
      container.innerHTML += `<div class="review-item ${statusClass}"><div class="review-question-title"><span class="part-badge ${getPartBadgeClass(q.partType)}">${q.partType}</span> Câu ${q.displayOrder} - ${currentTestCode}</div><div class="question-content">${q.content}</div>${optionsHtml}</div>`;
    }
  });
  if (window.MathJax) setTimeout(() => MathJax.typesetPromise(), 300);
}

function retryTest() {
  currentQuestions = getRandomQuestions(currentTestCode);
  if (currentQuestions.length === 0) {
    alert('Kho đề trống!');
    showScreen('main-screen');
    return;
  }
  userAnswers = {};
  timeLeft = 3600;
  testStartTime = new Date();
  currentQuestionIndex = 0;
  isTransitioning = false;
  isCheating = false;
  renderCurrentQuestion();
  startTimer();
  document.addEventListener('visibilitychange', handleVisibilityChange);
  showScreen('test-screen');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('grade-select').addEventListener('change', updateTestCode);
  document.getElementById('term-select').addEventListener('change', updateTestCode);
  document.getElementById('start-btn').addEventListener('click', startTest);
  document.getElementById('submit-test-btn').addEventListener('click', submitTest);
  document.getElementById('retry-btn').addEventListener('click', retryTest);
  document.getElementById('back-btn').addEventListener('click', () => showScreen('main-screen'));
});
</script>
</body>
</html>
